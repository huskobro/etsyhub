services:
  postgres:
    image: postgres:16-alpine
    container_name: etsyhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: etsyhub
      POSTGRES_PASSWORD: etsyhub_dev
      POSTGRES_DB: etsyhub
    ports:
      - "5432:5432"
    volumes:
      - etsyhub_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: etsyhub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - etsyhub_redis:/data

  minio:
    image: minio/minio:latest
    container_name: etsyhub-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: etsyhub
      MINIO_ROOT_PASSWORD: etsyhub_dev_secret
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - etsyhub_minio:/data

volumes:
  etsyhub_pgdata:
  etsyhub_redis:
  etsyhub_minio:
