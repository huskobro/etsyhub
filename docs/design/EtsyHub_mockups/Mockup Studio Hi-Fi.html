<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<title>Mockup Studio · Hi-Fi</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="tokens.css" />
<link rel="stylesheet" href="mockup-studio.css" />

<style>
  html, body { margin: 0; padding: 0; background: #1A1715; }
  body { font-family: var(--font-sans); color: var(--color-text); }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="mockup-studio-shared.jsx"></script>
<script type="text/babel" src="mockup-studio-screens-a.jsx"></script>
<script type="text/babel" src="mockup-studio-screens-b.jsx"></script>

<script type="text/babel">
const {
  DesignCanvas, DCSection, DCArtboard,
  S1_StudioHome, S2_DesignDrawer, S3_CategoryPreset,
  S4_TemplateLibrary, S5_PlacementEditor, S6_BatchReview,
  S7_RenderQueue, S8_OutputGallery, S9_SendToListing,
  S10_SavedSets, S11_FailedRecovery, S12_Onboarding, S13_AdminTemplates,
} = window;

function App() {
  return (
    <DesignCanvas
      title="Mockup Studio · Hi-Fi"
      subtitle="13 ekran · 7 akış · editoryal kokpit dilinde tamamlanmış prototype"
      storageKey="ms-hifi-canvas"
    >
      <DCSection id="core" title="Core flow · tasarım → kategori → batch → output → listing">
        <DCArtboard id="s1" label="S1 · Studio Home" width={1440} height={1040}><S1_StudioHome/></DCArtboard>
        <DCArtboard id="s2" label="S2 · Design Selection Drawer" width={1440} height={1040}><S2_DesignDrawer/></DCArtboard>
        <DCArtboard id="s3" label="S3 · Category & Preset Picker" width={1440} height={1040}><S3_CategoryPreset/></DCArtboard>
        <DCArtboard id="s4" label="S4 · Template Library Grid" width={1440} height={1040}><S4_TemplateLibrary/></DCArtboard>
        <DCArtboard id="s5" label="S5 · Placement Editor" width={1440} height={1040}><S5_PlacementEditor/></DCArtboard>
        <DCArtboard id="s6" label="S6 · Batch Review · 12 mockup" width={1440} height={1040}><S6_BatchReview/></DCArtboard>
      </DCSection>

      <DCSection id="render" title="Render & output · queue → gallery → listing bridge">
        <DCArtboard id="s7" label="S7 · Render Queue" width={1440} height={1040}><S7_RenderQueue/></DCArtboard>
        <DCArtboard id="s8" label="S8 · Output Gallery" width={1440} height={1040}><S8_OutputGallery/></DCArtboard>
        <DCArtboard id="s9" label="S9 · Send to Listing" width={1440} height={1040}><S9_SendToListing/></DCArtboard>
      </DCSection>

      <DCSection id="reuse" title="Reuse & recovery · saved sets, failed recovery, onboarding">
        <DCArtboard id="s10" label="S10 · Saved Sets" width={1440} height={1040}><S10_SavedSets/></DCArtboard>
        <DCArtboard id="s11" label="S11 · Failed Render Recovery" width={1440} height={1040}><S11_FailedRecovery/></DCArtboard>
        <DCArtboard id="s12" label="S12 · First-time Onboarding" width={1440} height={1040}><S12_Onboarding/></DCArtboard>
      </DCSection>

      <DCSection id="admin" title="Admin · template catalog management">
        <DCArtboard id="s13" label="S13 · Admin Template Catalog" width={1440} height={1040}><S13_AdminTemplates/></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</head>
<body>
<div id="root"></div>
</body>
</html>
