<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Kivasy · v7 — Mini Wave D (D1 + D2)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin/>
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@300,400,500,600,700&f[]=clash-display@500,600,700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com/3.4.10"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="v4/tokens.css"/>
  <style>
    /* Local-only amber tokens for D2 override caption — composed from
       existing v4 amber-adjacent palette, not a new design token. */
    :root { --k-amber: #D99A2B; --k-amber-ink: #8A5B14; }

    .v7-picker { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 70; background: #16130F; color: #fff; padding: 4px; border-radius: 12px; display: flex; gap: 2px; box-shadow: 0 12px 32px rgba(0,0,0,0.30); }
    .v7-picker button { padding: 7px 12px; border-radius: 9px; font-size: 12px; font-family: var(--k-font-mono); letter-spacing: 0.04em; color: rgba(255,255,255,0.6); border: none; background: transparent; cursor: pointer; transition: all 140ms; }
    .v7-picker button[aria-pressed="true"] { background: var(--k-orange); color: #fff; }
    .v7-picker button:hover:not([aria-pressed="true"]) { color: #fff; background: rgba(255,255,255,0.08); }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="v4/base.jsx" data-presets="env,react"></script>
<script type="text/babel" src="v7/screens-d.jsx" data-presets="env,react"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;

const SURFACES = [
  { id:"d1",  short:"D1",  label:"Settings · AI Providers",       sidebar:"settings", component:"D1Providers" },
  { id:"d2a", short:"D2a", label:"A6 · Prompt Preview collapsed", sidebar:"library",  component:"D2A6PromptPreview", initialMode:"collapsed" },
  { id:"d2b", short:"D2b", label:"A6 · Prompt Preview edited",    sidebar:"library",  component:"D2A6PromptPreview", initialMode:"edited" },
];

function App() {
  const [active, setActive] = useState(() => {
    const h = (location.hash || "").replace("#","");
    const m = SURFACES.find(s => s.id === h);
    return m ? m.id : "d1";
  });
  useEffect(() => {
    const onHash = () => {
      const h = (location.hash || "").replace("#","");
      const m = SURFACES.find(s => s.id === h);
      if (m) setActive(m.id);
    };
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);

  const surface = SURFACES.find(s => s.id === active) || SURFACES[0];
  const Screen = window[surface.component];

  return (
    <div className="flex h-screen w-screen overflow-hidden" data-screen-label={`${surface.short} ${surface.label}`}>
      <Sidebar active={surface.sidebar}/>
      {Screen ? <Screen key={surface.id} initialMode={surface.initialMode}/> : <div className="p-10">Loading…</div>}

      <div className="v7-picker">
        {SURFACES.map((s) => (
          <button key={s.id} aria-pressed={s.id === active} onClick={() => { location.hash = s.id; setActive(s.id); }}>
            {s.short} · {s.label}
          </button>
        ))}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
