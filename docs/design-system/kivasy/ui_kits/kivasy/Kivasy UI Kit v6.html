<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Kivasy · v6 — C1–C3 surfaces</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin/>
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@300,400,500,600,700&f[]=clash-display@500,600,700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com/3.4.10"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="v4/tokens.css"/>
  <style>
    .v6-picker { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 70; background: #16130F; color: #fff; padding: 4px; border-radius: 12px; display: flex; gap: 2px; box-shadow: 0 12px 32px rgba(0,0,0,0.30); }
    .v6-picker button { padding: 7px 12px; border-radius: 9px; font-size: 12px; font-family: var(--k-font-mono); letter-spacing: 0.04em; color: rgba(255,255,255,0.6); border: none; background: transparent; cursor: pointer; transition: all 140ms; }
    .v6-picker button[aria-pressed="true"] { background: var(--k-orange); color: #fff; }
    .v6-picker button:hover:not([aria-pressed="true"]) { color: #fff; background: rgba(255,255,255,0.08); }
    .v6-picker .v6-picker__div { width: 1px; background: rgba(255,255,255,0.10); margin: 4px 4px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="v4/base.jsx" data-presets="env,react"></script>
<script type="text/babel" src="v6/screens-c1.jsx" data-presets="env,react"></script>
<script type="text/babel" src="v6/screens-c2.jsx" data-presets="env,react"></script>
<script type="text/babel" src="v6/screens-c3.jsx" data-presets="env,react"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;

const SURFACES = [
  { id:"c3",      short:"C3",  label:"Overview",            sidebar:"overview",  component:"C3Overview" },
  { id:"c1",      short:"C1",  label:"Templates",           sidebar:null,        component:"C1Templates", customSidebar:"templates" },
  { id:"c2",      short:"C2",  label:"Settings · General",  sidebar:"settings",  component:"C2Settings",  initialPane:"general" },
  { id:"c2-etsy", short:"C2+", label:"Settings · Etsy",     sidebar:"settings",  component:"C2Settings",  initialPane:"etsy" },
];

function App() {
  const [active, setActive] = useState(() => {
    const h = (location.hash || "").replace("#","");
    const m = SURFACES.find(s => s.id === h);
    return m ? m.id : "c3";
  });
  useEffect(() => {
    const onHash = () => {
      const h = (location.hash || "").replace("#","");
      const m = SURFACES.find(s => s.id === h);
      if (m) setActive(m.id);
    };
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);

  const surface = SURFACES.find(s => s.id === active) || SURFACES[0];
  const Screen = window[surface.component];
  /* Templates is not in the v4 sidebar nav — it's a System surface.
     Show sidebar with no active highlight by passing a sentinel. */
  const sidebarKey = surface.sidebar ?? "templates";

  return (
    <div className="flex h-screen w-screen overflow-hidden" data-screen-label={`${surface.short} ${surface.label}`}>
      <Sidebar active={sidebarKey}/>
      {Screen ? <Screen key={surface.id} initialPane={surface.initialPane}/> : <div className="p-10">Loading…</div>}

      <div className="v6-picker">
        {SURFACES.map((s) => (
          <button key={s.id} aria-pressed={s.id === active} onClick={() => { location.hash = s.id; setActive(s.id); }}>
            {s.short} · {s.label}
          </button>
        ))}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
