<!doctype html>
<html><head><meta charset="utf-8"/>
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../ui_kits/kivasy/v4/tokens.css"/>
<style>
  body { margin: 0; padding: 28px; background: var(--k-bg); }
  .row { display: flex; align-items: center; gap: 14px; padding: 6px 0; }
  .label { font-family: var(--k-font-mono); font-size: 10.5px; color: var(--k-ink-3); width: 70px; letter-spacing: 0.06em; }
  .bar { background: var(--k-orange); height: 14px; border-radius: 4px; }
  .px  { font-family: var(--k-font-mono); font-size: 11px; color: var(--k-ink-2); margin-left: 8px; }
</style></head><body>
  <div class="row"><span class="label">4 · xs</span>  <div class="bar" style="width:4px;"></div>  <span class="px">4px</span></div>
  <div class="row"><span class="label">8 · sm</span>  <div class="bar" style="width:8px;"></div>  <span class="px">8px</span></div>
  <div class="row"><span class="label">12 · md</span> <div class="bar" style="width:12px;"></div> <span class="px">12px</span></div>
  <div class="row"><span class="label">16 · lg</span> <div class="bar" style="width:16px;"></div> <span class="px">16px</span></div>
  <div class="row"><span class="label">24 · xl</span> <div class="bar" style="width:24px;"></div> <span class="px">24px</span></div>
  <div class="row"><span class="label">32 · 2xl</span><div class="bar" style="width:32px;"></div> <span class="px">32px · gutter</span></div>
  <div class="row"><span class="label">48 · 3xl</span><div class="bar" style="width:48px;"></div> <span class="px">48px · section</span></div>
</body></html>
