<!doctype html>
<html><head><meta charset="utf-8"/>
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../ui_kits/kivasy/v4/tokens.css"/>
<style>
  body { margin: 0; padding: 28px; background: var(--k-bg); }
  .stack { display: flex; flex-direction: column; gap: 16px; max-width: 640px; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .label { font-family: var(--k-font-mono); font-size: 10px; letter-spacing: 0.14em;
           text-transform: uppercase; color: var(--k-ink-3); width: 92px; }
</style></head><body>
<div class="stack">
  <div class="row"><span class="label">Filter chips</span>
    <button class="k-chip k-chip--active">Wall art</button>
    <button class="k-chip">Clipart</button>
    <button class="k-chip">Bookmark</button>
    <button class="k-chip">Sticker</button>
  </div>
  <div class="row"><span class="label">Sibling tabs</span>
    <div class="k-stabs">
      <button class="k-stab k-stab--active">Image URL</button>
      <button class="k-stab">Upload Image</button>
      <button class="k-stab">From Bookmark</button>
    </div>
  </div>
  <div class="row"><span class="label">Density</span>
    <div class="k-segment">
      <button aria-pressed="true">Comfortable</button>
      <button>Dense</button>
    </div>
  </div>
  <div class="row"><span class="label">Input</span>
    <input class="k-input" placeholder="Paste image URL…" style="max-width: 320px;"/>
  </div>
</div>
</body></html>
