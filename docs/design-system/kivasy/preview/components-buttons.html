<!doctype html>
<html><head><meta charset="utf-8"/>
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&f[]=clash-display@500,600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../ui_kits/kivasy/v4/tokens.css"/>
<style>
  body { margin: 0; padding: 28px; background: var(--k-bg); }
  .stack { display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .label { font-family: var(--k-font-mono); font-size: 10px; letter-spacing: 0.14em;
           text-transform: uppercase; color: var(--k-ink-3); width: 92px; }
</style></head><body>
<div class="stack">
  <div class="row"><span class="label">Stage CTA</span>
    <button class="k-btn k-btn--primary">+ Add Reference</button>
    <button class="k-btn k-btn--edit">Edit Selection</button>
    <button class="k-btn k-btn--publish">Send to Etsy</button>
  </div>
  <div class="row"><span class="label">Neutral</span>
    <button class="k-btn k-btn--secondary">Cancel</button>
    <button class="k-btn k-btn--ghost">Skip</button>
    <button class="k-btn k-btn--destructive">Delete</button>
  </div>
  <div class="row"><span class="label">Sizes</span>
    <button class="k-btn k-btn--primary" data-size="sm">Add</button>
    <button class="k-btn k-btn--primary">Add reference</button>
    <button class="k-btn k-btn--primary" data-size="lg">+ New Batch</button>
  </div>
</div>
</body></html>
