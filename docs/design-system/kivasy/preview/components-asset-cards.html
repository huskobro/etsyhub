<!doctype html>
<html><head><meta charset="utf-8"/>
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../ui_kits/kivasy/v4/tokens.css"/>
<style>
  body { margin: 0; padding: 28px; background: var(--k-bg); }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .card { padding: 12px; }
  .title { font-size: 13.5px; font-weight: 540; color: var(--k-ink); margin-top: 10px; }
  .meta { font-family: var(--k-font-mono); font-size: 10.5px; color: var(--k-ink-3); margin-top: 4px; letter-spacing: 0.04em; }
  .row { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
</style></head><body>
  <div class="grid">
    <div class="k-card card">
      <div class="k-thumb" data-kind="christmas"></div>
      <div class="title">Holly wreath frost</div>
      <div class="row"><span class="k-badge" data-tone="accent">WALL ART</span><span class="meta">2h ago</span></div>
    </div>
    <div class="k-card card">
      <div class="k-thumb" data-kind="boho"></div>
      <div class="title">Boho line crescent</div>
      <div class="row"><span class="k-badge" data-tone="purple">CLIPART</span><span class="meta">5h ago</span></div>
    </div>
    <div class="k-card card">
      <div class="k-thumb" data-kind="abstract"></div>
      <div class="title">Sunset arch study</div>
      <div class="row"><span class="k-badge" data-tone="info">POSTER</span><span class="meta">1d ago</span></div>
    </div>
  </div>
</body></html>
