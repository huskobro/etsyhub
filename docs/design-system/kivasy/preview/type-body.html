<!doctype html>
<html><head><meta charset="utf-8"/>
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../ui_kits/kivasy/v4/tokens.css"/>
<style>
  body { margin: 0; padding: 28px; background: var(--k-bg); }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 10px 0; border-bottom: 1px solid var(--k-line); }
  .meta { font-family: var(--k-font-mono); font-size: 10.5px; color: var(--k-ink-3); width: 100px; letter-spacing: 0.06em; text-transform: uppercase; }
  .body { font-family: var(--k-font-sans); color: var(--k-ink); letter-spacing: -0.005em; }
</style></head><body>
  <div class="row"><span class="meta">XL · 18/600</span><span class="body" style="font-size:18px; font-weight:600;">Bring cozy holiday warmth to your walls</span></div>
  <div class="row"><span class="meta">LG · 15/540</span><span class="body" style="font-size:15px; font-weight:540;">12 designs · ready to package</span></div>
  <div class="row"><span class="meta">MD · 13.5/500</span><span class="body" style="font-size:13.5px;">Default body. Generates listing copy from style profile + selected mockups.</span></div>
  <div class="row"><span class="meta">SM · 12.5/500</span><span class="body" style="font-size:12.5px; color:var(--k-ink-2);">Filter chips, dense table cells, secondary meta.</span></div>
  <div class="row" style="border:none;"><span class="meta">XS · 11/500</span><span class="body" style="font-size:11px; color:var(--k-ink-3);">Caption, helper text, breadcrumb segment.</span></div>
</body></html>
