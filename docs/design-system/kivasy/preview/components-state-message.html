<!doctype html>
<html><head><meta charset="utf-8"/>
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&f[]=clash-display@500,600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<style>
  body { margin: 0; padding: 28px; background: var(--k-bg); display: flex; align-items: center; justify-content: center; }
  .state { background: var(--k-paper); border: 1px solid var(--k-line); border-radius: 14px; padding: 36px 32px; text-align: center; max-width: 360px; }
  .icon { width: 44px; height: 44px; border-radius: 10px; background: var(--k-orange-soft); margin: 0 auto 14px; display: flex; align-items: center; justify-content: center; color: var(--k-orange-ink); font-family: var(--k-font-display); font-weight: 600; font-size: 20px; }

  .body { font-size: 13px; color: var(--k-ink-2); line-height: 1.5; margin-bottom: 16px; }

  <div class="state">
    <div class="icon">+</div>
    <div class="title">No references yet</div>
    <div class="body">Pull inspiration from Etsy, Pinterest, or paste an image URL. Promote bookmarks to References when ready to generate variations.</div>
    <button class="k-btn k-btn--primary">+ Add Reference</button>
  </div>
