<!doctype html>
<html><head><meta charset="utf-8"/>
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../ui_kits/kivasy/v4/tokens.css"/>
<style>
  body { margin: 0; padding: 28px; background: var(--k-bg); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .swatch { border-radius: 10px; padding: 14px; height: 96px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--k-line); }
  .label { font-family: var(--k-font-mono); font-size: 10.5px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--k-ink-2); }
  .hex   { font-family: var(--k-font-mono); font-size: 12px; color: var(--k-ink-3); }
</style></head><body>
  <div class="grid">
    <div class="swatch" style="background: var(--k-bg);">       <span class="label">Bg</span>       <span class="hex">#F7F5EF</span></div>
    <div class="swatch" style="background: var(--k-bg-2);">     <span class="label">Bg-2</span>     <span class="hex">#F1EEE5</span></div>
    <div class="swatch" style="background: var(--k-paper);">    <span class="label">Paper</span>    <span class="hex">#FFFFFF</span></div>
    <div class="swatch" style="background: var(--k-line); border:none;"><span class="label">Line</span><span class="hex">#E4E0D5</span></div>
  </div>
</body></html>
