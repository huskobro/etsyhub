<!doctype html>
<html><head><meta charset="utf-8"/>
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../ui_kits/kivasy/v4/tokens.css"/>
<style>
  body { margin: 0; padding: 28px; background: var(--k-bg); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .cell { display: flex; flex-direction: column; gap: 6px; }
  .label { font-family: var(--k-font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--k-ink-3); }
</style></head><body>
  <div class="grid">
    <div class="cell"><div class="k-thumb" data-kind="christmas"></div><span class="label">Christmas</span></div>
    <div class="cell"><div class="k-thumb" data-kind="boho"></div><span class="label">Boho</span></div>
    <div class="cell"><div class="k-thumb" data-kind="nursery"></div><span class="label">Nursery</span></div>
    <div class="cell"><div class="k-thumb" data-kind="poster"></div><span class="label">Poster</span></div>
    <div class="cell"><div class="k-thumb" data-kind="abstract"></div><span class="label">Abstract</span></div>
    <div class="cell"><div class="k-thumb" data-kind="landscape"></div><span class="label">Landscape</span></div>
    <div class="cell"><div class="k-thumb" data-kind="riso"></div><span class="label">Riso</span></div>
    <div class="cell"><div class="k-thumb" data-kind="sticker"></div><span class="label">Sticker</span></div>
    <div class="cell"><div class="k-thumb" data-kind="clipart"></div><span class="label">Clipart</span></div>
  </div>
</body></html>
